<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e8b81" />

    <!-- Apply the saved/system theme before first paint to avoid a flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("casaclean:theme");
          var system = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          var resolved = stored === "dark" || stored === "light" ? stored : system;
          if (resolved === "dark") document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>

    <!-- Preconnect to font CDN for faster first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>CasaClean — Premium Turnover Cleaning for Vacation Rentals</title>
    <meta
      name="description"
      content="CasaClean delivers guest-ready turnovers for Airbnb hosts, vacation rental owners and property managers — cleaning, inspections, linens and restocking, on schedule, every time."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
